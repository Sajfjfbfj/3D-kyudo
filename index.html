<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弓道 射法八節 3D筋肉色分けビューア</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.82);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f1f5f9;
      --muted: #a9b6cd;
      --accent: #7dd3fc;
      --accent-2: #fb7185;
      --accent-3: #fbbf24;
      --ok: #34d399;
      --shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(251, 113, 133, 0.10), transparent 24%),
        linear-gradient(180deg, #08101d 0%, #0b1220 100%);
    }
    a { color: #93c5fd; }
    .wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .viewer-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 500px;
    }
    .header {
      padding: 14px 16px 8px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(125, 211, 252, 0.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    h1 {
      margin: 8px 0 6px;
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.2;
    }
    .sub {
      color: var(--muted);
      line-height: 1.5;
      font-size: 12.5px;
      margin: 0;
    }
    #viewer {
      position: relative;
      flex: 1;
      background:
        radial-gradient(circle at 50% 15%, rgba(125, 211, 252, 0.13), transparent 32%),
        linear-gradient(180deg, rgba(15,23,42,.2), rgba(2,6,23,.88));
    }
    canvas { display: block; width: 100%; height: 100%; }
    .viewer-overlay {
      position: absolute;
      inset: 16px 16px auto 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      flex-wrap: wrap;
    }
    .pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,.72);
      border: 1px solid rgba(148,163,184,.16);
      color: #d8e4f7;
      font-size: 11px;
      backdrop-filter: blur(10px);
    }
    .controls {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15,23,42,.35), rgba(15,23,42,.85));
    }
    .btn-row, .slider-row {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      gap: 10px;
      align-items: center;
    }
    .btn-row::-webkit-scrollbar { display: none; }
    .slider-row { margin-top: 12px; }
    button {
      flex-shrink: 0;
      appearance: none;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(30,41,59,.9);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
      font-size: 12px;
    }
    button:hover { transform: translateY(-1px); background: rgba(51,65,85,.96); }
    button.active { background: linear-gradient(135deg, rgba(14,165,233,.9), rgba(59,130,246,.85)); }
    .ghost { background: rgba(15,23,42,.35); }
    input[type="range"] {
      width: min(100%, 480px);
      accent-color: var(--accent);
    }
    .time {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 13px;
    }
    .right-panel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }
    .stage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 16px 0;
    }
    .stage-btn {
      text-align: left;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.14);
      background: linear-gradient(180deg, rgba(30,41,59,.88), rgba(15,23,42,.88));
      min-height: 64px;
    }
    .stage-btn small { display:block; color: var(--muted); margin-bottom:2px; font-weight:600; font-size:10px; }
    .stage-btn strong { display:block; font-size: 14px; }
    .stage-btn.active {
      border-color: rgba(125,211,252,.42);
      box-shadow: 0 0 0 1px rgba(125,211,252,.15) inset, 0 8px 20px rgba(2,132,199,.15);
      background: linear-gradient(180deg, rgba(14,165,233,.26), rgba(15,23,42,.96));
    }
    .content {
      padding: 12px 16px 10px;
      overflow: auto;
    }
    .card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card h2, .card h3 { margin: 0 0 8px; font-size: 14px; }
    .stage-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stage-title .jp {
      font-size: clamp(20px, 2vw, 26px);
      font-weight: 800;
    }
    .stage-title .en {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: .03em;
      font-size: 14px;
    }
    .desc {
      color: #edf4ff;
      line-height: 1.6;
      margin: 0 0 6px;
      font-size: 13px;
    }
    .note {
      color: var(--muted);
      line-height: 1.6;
      font-size: 12px;
      margin: 0;
    }
    .muscle-section { margin-top: 10px; }
    .muscle-section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .muscle-section-label.primary { color: #fb7185; }
    .muscle-section-label.secondary { color: #fbbf24; }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }
    .tag:hover {
      filter: brightness(1.2);
      transform: scale(1.03);
    }
    .tag.solo {
      outline: 2px solid white;
      outline-offset: 1px;
    }
    .tag.primary {
      background: rgba(251,113,133,.13);
      color: #fca5a5;
      border: 1px solid rgba(251,113,133,.22);
    }
    .tag.secondary {
      background: rgba(251,191,36,.1);
      color: #fde68a;
      border: 1px solid rgba(251,191,36,.18);
    }
    .analogy-box {
      background: rgba(125, 211, 252, 0.08);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 12px;
      border-radius: 0 8px 8px 0;
    }
    .advice-box {
      background: rgba(52, 211, 153, 0.08);
      border-left: 3px solid var(--ok);
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 12px;
      border-radius: 0 8px 8px 0;
    }
    .tag .dot {
      width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0;
    }
    .tag.primary .dot { background: #fb7185; }
    .tag.secondary .dot { background: #fbbf24; }
    .footer-note {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }
    /* 横画面時のレイアウト（デスクトップ or 横向きモバイル） */
    @media (min-width: 1100px), (orientation: landscape) {
      .wrap {
        display: grid;
        grid-template-columns: 1.2fr 0.95fr;
        height: 100vh;
        height: 100svh;
        overflow: hidden;
        padding: 8px;
        gap: 8px;
      }
      .viewer-panel, .right-panel { height: 100%; }
      .content { overflow-y: auto; }
    }

    /* 縦画面警告オーバーレイ */
    #orientation-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    /* スマホ・タブレット（1024px以下）の縦向き時にのみ表示 */
    @media screen and (max-width: 1024px) and (orientation: portrait) {
      #orientation-overlay { display: flex; }
    }

    .rotate-hint {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      color: var(--accent);
      animation: rotate-anim 2s ease-in-out infinite;
    }
    @keyframes rotate-anim {
      0% { transform: rotate(0deg); }
      70% { transform: rotate(-90deg); }
      100% { transform: rotate(-90deg); }
    }

    /* 横向きスマホ（高さが低い画面）専用の最適化 */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      .header { padding: 6px 12px 4px; }
      .header h1 { font-size: 16px; margin: 0; }
      .header .eyebrow, .header .sub { display: none; }
      .viewer-panel { min-height: 0; }

      /* 節ボタンを横スクロールの1列に変更して縦幅を節約 */
      .stage-grid {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 5px 12px;
        gap: 6px;
        border-bottom: 1px solid var(--line);
        -webkit-overflow-scrolling: touch;
      }
      .stage-grid::-webkit-scrollbar { display: none; }
      
      .stage-btn {
        min-height: auto;
        padding: 6px 12px;
        flex: 0 0 auto;
        border-radius: 8px;
      }
      .stage-btn small { display: none; }
      .stage-btn strong { font-size: 12px; }

      .content { padding: 8px 12px; }
      .card { padding: 10px; border-radius: 10px; margin-bottom: 6px; }
      .stage-title { margin-bottom: 4px; }
      .stage-title .jp { font-size: 18px; }
      .stage-title .en { font-size: 11px; }
      .desc, .note, .analogy-box, .advice-box { font-size: 11px; margin: 4px 0; line-height: 1.4; }
      .muscle-section { margin-top: 6px; }
      .muscle-section-label { font-size: 10px; margin-bottom: 4px; }
      .tag { font-size: 10px; padding: 3px 8px; }

      .controls { padding: 4px 12px 6px; }
      .btn-row { gap: 6px; }
      .btn-row button { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
      .time { font-size: 11px; }
      .slider-row { margin-top: 2px; }
      .slider-row .time { display: none; }
      input[type="range"] { height: 24px; }
    }

    @media (max-width: 600px) and (orientation: portrait) {
      .stage-grid { grid-template-columns: repeat(2, 1fr); }
      .btn-row button { padding: 6px 10px; font-size: 11px; }
      h1 { font-size: 20px; }
      .header { padding: 10px 12px; }
      .viewer-panel { min-height: 450px; }
    }
  </style>
</head>
<body>
  <!-- 縦画面警告オーバーレイ -->
  <div id="orientation-overlay">
    <div class="rotate-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
    </div>
    <h2 style="margin:0 0 10px;">画面を横向きにしてください</h2>
    <p class="sub">この教材は横画面での閲覧に最適化されています。</p>
  </div>

  <div class="wrap">
    <!-- 左パネル: 3Dビューア -->
    <section class="panel viewer-panel">
      <div class="header">
        <div class="eyebrow">3D / 筋肉色分けビューア</div>
        <h1>弓道・射法八節 3D解説</h1>
        <p class="sub">節ボタンで局面移動、筋肉タグクリックで特定部位の単独表示が可能です。</p>
      </div>
      <div id="viewer">
      </div>
      <div class="controls">
        <div class="btn-row">
          <button id="playBtn">全体再生</button>
          <button id="pauseBtn" class="ghost">停止</button>
          <button id="resetBtn" class="ghost">先頭に戻す</button>
          <button id="fitBtn" class="ghost">中央表示</button>
          <span class="time" id="timeLabel">0.00 s</span>
        </div>
        <div class="slider-row">
          <input id="timeline" type="range" min="0" max="7.041667" step="0.041667" value="0.041667" />
          <span class="time">ドラッグでポーズ移動</span>
        </div>
      </div>
    </section>

    <!-- 右パネル: 射法八節 選択 + 筋肉解説 -->
    <aside class="panel right-panel">
      <div class="header">
        <div class="eyebrow">射法八節</div>
        <h1>節を選んで動作を確認</h1>
        <p class="sub"><a href="https://www.kyudo.jp/howto/syaho.html" target="_blank" rel="noreferrer">全日本弓道連盟</a>資料および研究論文を基に構成。</p>
      </div>

      <div class="stage-grid" id="stageGrid"></div>

      <div class="content">
        <section class="card">
          <div class="stage-title">
            <div class="jp" id="stageName">足踏み</div>
            <div class="en" id="stageEn">Ashibumi</div>
          </div>
          <p class="desc" id="stageDesc"></p>
          <div id="stageAnalogy" class="analogy-box"></div>
          <div id="stageAdvice" class="advice-box"></div>
          <p class="note" id="stageMuscleNote"></p>

          <div class="muscle-section" id="primarySection">
            <div class="muscle-section-label primary">主動筋（Primary）</div>
            <div class="tags" id="primaryTags"></div>
          </div>
          <div class="muscle-section" id="secondarySection" style="margin-top:12px;">
            <div class="muscle-section-label secondary">補助・安定筋（Secondary）</div>
            <div class="tags" id="secondaryTags"></div>
          </div>
        </section>
      </div>
    </aside>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ================================================================
    // GLBから実取得したノード名に基づく筋肉グループ定義
    // (pygltflib で弓道基礎１.glb を解析して確認)
    // ================================================================
    const MUSCLE_NODES = {
      大腿四頭筋:      ['筋_大腿四頭筋_L',    '筋_大腿四頭筋_R'],
      ハムストリングス:['筋_ハムストリングス_L','筋_ハムストリングス_R'],
      大殿筋:          ['筋_大殿筋_L',         '筋_大殿筋_R'],
      内転筋:          ['筋_内転筋_L',         '筋_内転筋_R'],
      腸腰筋:          ['筋_腸腰筋_L',         '筋_腸腰筋_R'],
      脊柱起立筋:      ['筋_脊柱起立筋'],
      腹横筋:          ['筋_腹横筋'],
      腹直筋:          ['筋_腹直筋'],
      外腹斜筋:        ['筋_外腹斜筋_L',       '筋_外腹斜筋_R'],
      多裂筋:          ['筋_多裂筋'],
      僧帽筋上部:      ['筋_僧帽筋_上部'],
      僧帽筋中下部:    ['筋_僧帽筋_中下部'],
      菱形筋:          ['筋_菱形筋'],
      広背筋:          ['筋_広背筋_L',         '筋_広背筋_R'],
      大胸筋:          ['筋_大胸筋_L',         '筋_大胸筋_R'],
      前鋸筋:          ['筋_前鋸筋_L',         '筋_前鋸筋_R'],
      三角筋:          ['筋_三角筋_L',         '筋_三角筋_R'],
      大円筋:          ['筋_大円筋_L',         '筋_大円筋_R'],
      小円筋:          ['筋_小円筋_L',         '筋_小円筋_R'],
      棘上筋:          ['筋_棘上筋_L',         '筋_棘上筋_R'],
      棘下筋:          ['筋_棘下筋_L',         '筋_棘下筋_R'],
      肩甲下筋:        ['筋_肩甲下筋_L',       '筋_肩甲下筋_R'],
      上腕三頭筋:      ['筋_上腕三頭筋_L',     '筋_上腕三頭筋_R'],
      上腕二頭筋:      ['筋_上腕二頭筋_L',     '筋_上腕二頭筋_R'],
      腕橈骨筋:        ['筋_腕橈骨筋_L',       '筋_腕橈骨筋_R'],
      胸鎖乳突筋:      ['筋_胸鎖乳突筋_L',     '筋_胸鎖乳突筋_R'],
    };

    // ノード名 → 筋肉グループ名の逆引きマップ
    const NODE_TO_GROUP = new Map();
    for (const [group, nodes] of Object.entries(MUSCLE_NODES)) {
      for (const n of nodes) NODE_TO_GROUP.set(n, group);
    }

    // ================================================================
    // 射法八節データ (フレーム・筋肉マッピング・解説)
    // ================================================================
    const FPS = 24;
    const MAX_FRAME = 80;            // 残心の最終フレーム（これ以上は再生しない）
    const MAX_TIME  = MAX_FRAME / FPS; // = 3.333...s
    const stages = [
      {
        name: "足踏み", en: "Ashibumi", frame: 1, range: "1-9",
        desc: "すべての動作の土台となる立ち位置を定めます。",
        analogy: "「根を張る大樹」：地面から養分を吸い上げるようにどっしりと。",
        advice: "足の裏全体で均等に地面を踏みしめ、重心を親指の付け根（母指球）に意識しましょう。",
        muscleNote: "下肢の等尺性収縮と体幹深層筋（腹横筋・多裂筋）による軸安定が核心。",
        primary:   ['大腿四頭筋', 'ハムストリングス', '大殿筋', '脊柱起立筋'],
        secondary: ['内転筋', '腸腰筋', '腹横筋', '多裂筋'],
      },
      {
        name: "胴作り", en: "Dozukuri", frame: 10, range: "10-19",
        desc: "腰を据え、脊柱を正しく伸ばして上半身を安定させます。",
        analogy: "「不動の五重塔」：各層（骨格）が正しく積み重なり、揺るぎない状態。",
        advice: "頭のてっぺんから糸で吊るされている感覚で、背筋をスッと伸ばします。",
        muscleNote: "深層体幹筋が腰椎を安定。脊柱起立筋が伸展方向に働き、腹圧を高めます。",
        primary:   ['脊柱起立筋', '多裂筋'],
        secondary: ['腹横筋', '腹直筋', '外腹斜筋', '大腿四頭筋', 'ハムストリングス'],
      },
      {
        name: "弓構え", en: "Yugamae", frame: 20, range: "20-29",
        desc: "取懸け、手の内、物見を整え、集中を高めます。",
        analogy: "「卵を抱くような丸み」：懐に柔らかな空間を作り、嵐の前の静けさを維持。",
        advice: "肩を下げ、肘を外側に張ることで、背中に心地よい緊張感を持たせます。",
        muscleNote: "肩甲骨の安定化が重要。棘下筋などの旋回筋が肩関節を中心位に保持します。",
        primary:   ['棘上筋', '棘下筋', '肩甲下筋'],
        secondary: ['僧帽筋上部', '菱形筋', '三角筋', '前鋸筋', '腕橈骨筋'],
      },
      {
        name: "打ち起こし", en: "Uchiokoshi", frame: 30, range: "30-39",
        desc: "両拳を同じ高さに静かに持ち上げます。",
        analogy: "「天への階段」：雲を両手で押し上げるように、軽やかにかつ厳かに。",
        advice: "腕の力で上げず、背中の筋肉（前鋸筋）を使って肩甲骨から動かしましょう。",
        muscleNote: "三角筋が腕を挙上。脊柱起立筋が増大（早稲田大研究）し、姿勢を維持します。",
        primary:   ['三角筋', '前鋸筋', '脊柱起立筋'],
        secondary: ['僧帽筋上部', '棘上筋', '上腕三頭筋', '腹横筋', '多裂筋'],
      },
      {
        name: "引き分け", en: "Hikiwake", frame: 40, range: "40-49",
        desc: "左右均等に押し引きし、身体の中へ弓を引き込みます。",
        analogy: "「大河を分かつ」：行く手を阻む水の流れを、体幹の力で左右に押し開く。",
        advice: "肘で引くイメージを持つと、末端の余計な力が抜け、大きな筋肉を使えます。",
        muscleNote: "広背筋・大円筋が主動。僧帽筋中下部が肩甲骨を後退させ、肘を伸展させます。",
        primary:   ['広背筋', '大円筋', '僧帽筋中下部', '上腕三頭筋'],
        secondary: ['三角筋', '棘下筋', '菱形筋', '大胸筋', '前鋸筋', '腕橈骨筋'],
      },
      {
        name: "会", en: "Kai", frame: 50, range: "50-59",
        desc: "無限の伸合いと気力の充実を待つ、射の極致。",
        analogy: "「溢れる寸前の水」：器に水が満ち満ちて、表面張力でギリギリ保たれている状態。",
        advice: "止まっているのではなく、身体の内側から外側へ膨らみ続ける「伸合い」を意識。",
        muscleNote: "腹横筋・内腹斜筋が安定化に主導的役割（trunk module研究）を果たします。",
        primary:   ['広背筋', '僧帽筋中下部', '大胸筋', '上腕三頭筋'],
        secondary: ['腹横筋', '多裂筋', '三角筋', '大円筋', '棘下筋', '前鋸筋'],
      },
      {
        name: "離れ", en: "Hanare", frame: 60, range: "60-69",
        desc: "伸合いの結果として、弦が自然に解けます。",
        analogy: "「熟した実が落ちる」：重みに耐えかねた果実が、自然の摂理で枝を離れる瞬間。",
        advice: "自分の意思で「放す」のではなく、身体が開く力に任せて「放たれる」のを待ちます。",
        muscleNote: "弓手側の大胸筋・前鋸筋が急速に収縮。前腕筋群が手の内の弛緩を制御します。",
        primary:   ['大胸筋', '前鋸筋', '広背筋'],
        secondary: ['僧帽筋中下部', '上腕三頭筋', '腕橈骨筋', '三角筋', '腹横筋'],
      },
      {
        name: "残心", en: "Zanshin", frame: 70, range: "70-80",
        desc: "放れた後の姿勢を維持し、精神を継続させます。",
        analogy: "「波紋の広がり」：石を投げた後の静かな水面のように、余韻が広がっていく。",
        advice: "矢が的に当たったかよりも、自分の姿勢が崩れていないか内省しましょう。",
        muscleNote: "脊柱起立筋・多裂筋が直立を維持。下肢は足踏みの等尺性収縮を継続します。",
        primary:   ['脊柱起立筋', '多裂筋', '腹横筋'],
        secondary: ['僧帽筋中下部', '広背筋', '大腿四頭筋', 'ハムストリングス', '大殿筋'],
      },
    ];

    // ================================================================
    // Three.js セットアップ
    // ================================================================
    const COLOR_PRIMARY   = new THREE.Color(0xfb7185);
    const COLOR_SECONDARY = new THREE.Color(0xfbbf24);
    let currentStageIdx = 0;
    let currentSoloMuscle = null; // 特定の筋肉をソロ表示する場合のグループ名

    const container = document.getElementById('viewer');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 1.0, 4.0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x8fb8f0, 0.6);
    backLight.position.set(-4, 3, -6);
    scene.add(backLight);

    let mixer, animationAction;
    const clock = new THREE.Clock();
    let loadedModel = null;
    // マテリアルのオリジナル状態を保存
    const originalMaterials = new Map(); // mesh.uuid -> { color, transparent, opacity }

    // ================================================================
    // GLBロード
    // ================================================================
    const loader = new GLTFLoader();
    loader.load('弓道基礎１.glb', (gltf) => {
      const model = gltf.scene;
      model.rotation.x = Math.PI / 2;
      scene.add(model);
      loadedModel = model;

      // オリジナルマテリアルを保存
      model.traverse(obj => {
        if (!obj.isMesh) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(mat => {
          if (!originalMaterials.has(mat.uuid)) {
            originalMaterials.set(mat.uuid, {
              color: mat.color.clone(),
              transparent: mat.transparent,
              opacity: mat.opacity,
            });
          }
        });
      });

      // バウンディングボックス → カメラ位置
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const targetY = box.min.y + size.y * 0.52;
      controls.target.set(center.x, targetY, center.z);
      const halfH  = size.y / 2.2;
      const fovRad = (camera.fov * Math.PI) / 180;
      const dist   = (halfH / Math.tan(fovRad / 2)) * 1.15;
      camera.position.set(center.x, targetY, center.z + dist);
      controls.update();

      const defaultCamPos    = camera.position.clone();
      const defaultTargetPos = controls.target.clone();
      document.getElementById('fitBtn').addEventListener('click', () => {
        camera.position.copy(defaultCamPos);
        controls.target.copy(defaultTargetPos);
        controls.update();
      });

      // アニメーション設定
      if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        animationAction = mixer.clipAction(gltf.animations[0]);
        animationAction.setLoop(THREE.LoopOnce, 1); // 1回再生で止まる
        animationAction.clampWhenFinished = true;   // 最終フレームで静止
        animationAction.play();
        document.getElementById('timeline').max = MAX_TIME; // F80 = 3.333s まで
        selectStage(0);
      }
    }, undefined, (err) => {
      console.error('GLB load error:', err);
    });

    // ================================================================
    // 筋肉色分けロジック
    // ================================================================
    function setMeshColor(mesh, color, opacity) {
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      mats.forEach(mat => {
        mat.color.set(color);
        mat.transparent = true;
        mat.opacity = opacity;
        mat.depthWrite = opacity > 0.9;
        mat.needsUpdate = true;
      });
    }

    function resetMeshMaterial(mesh) {
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      mats.forEach(mat => {
        const orig = originalMaterials.get(mat.uuid);
        if (orig) {
          mat.color.copy(orig.color);
          mat.transparent = orig.transparent;
          mat.opacity = orig.opacity;
          mat.depthWrite = !orig.transparent;
          mat.needsUpdate = true;
        }
      });
    }

    function updateMuscles(stage, soloGroup = null) {
      if (!loadedModel) return;

      // 表示すべき単一筋肉のノードセット（ソロモード用）
      const soloNodes = new Set();
      if (soloGroup && MUSCLE_NODES[soloGroup]) {
        MUSCLE_NODES[soloGroup].forEach(n => soloNodes.add(n));
      }

      // primary / secondary のノード名セットを構築
      const primaryNodes   = new Set();
      const secondaryNodes = new Set();

      for (const group of stage.primary) {
        const nodes = MUSCLE_NODES[group];
        if (nodes) nodes.forEach(n => primaryNodes.add(n));
      }
      for (const group of stage.secondary) {
        const nodes = MUSCLE_NODES[group];
        if (nodes) nodes.forEach(n => secondaryNodes.add(n));
      }

      loadedModel.traverse(obj => {
        // 素体は常時表示・色変更なし
        if (obj.name === 'kyudo_male_base') {
          obj.visible = true;
          return;
        }

        if (!obj.isMesh) return;

        // ノード名を特定: obj自身の名前か、親ノードの名前
        const nodeName = primaryNodes.has(obj.name) || secondaryNodes.has(obj.name)
          ? obj.name
          : (obj.parent?.name ?? obj.name);

        // ソロモードの判定
        if (soloGroup) {
          if (soloNodes.has(nodeName)) {
            obj.visible = true;
            const isPri = primaryNodes.has(nodeName);
            setMeshColor(obj, isPri ? COLOR_PRIMARY : COLOR_SECONDARY, 0.95);
          } else {
            obj.visible = false;
          }
          return;
        }

        if (primaryNodes.has(nodeName)) {
          obj.visible = true;
          setMeshColor(obj, COLOR_PRIMARY, 0.92);
        } else if (secondaryNodes.has(nodeName)) {
          obj.visible = true;
          setMeshColor(obj, COLOR_SECONDARY, 0.82);
        } else {
          // 非選択筋は非表示
          obj.visible = false;
        }
      });
    }

    // ================================================================
    // UI 生成・イベント
    // ================================================================
    const stageGrid    = document.getElementById('stageGrid');
    const stageName    = document.getElementById('stageName');
    const stageEn      = document.getElementById('stageEn');
    const stageDesc    = document.getElementById('stageDesc');
    const stageAnalogy = document.getElementById('stageAnalogy');
    const stageAdvice  = document.getElementById('stageAdvice');
    const musNote      = document.getElementById('stageMuscleNote');
    const primaryTags  = document.getElementById('primaryTags');
    const secondaryTags = document.getElementById('secondaryTags');
    const playBtn      = document.getElementById('playBtn');
    const pauseBtn     = document.getElementById('pauseBtn');
    const resetBtn     = document.getElementById('resetBtn');
    const timeline     = document.getElementById('timeline');
    const timeLabel    = document.getElementById('timeLabel');

    // ステージボタン生成
    stages.forEach((s, idx) => {
      const btn = document.createElement('button');
      btn.className = 'stage-btn';
      btn.innerHTML = `<small>第${idx + 1}節</small><strong>${s.name}</strong>`;
      btn.addEventListener('click', () => selectStage(idx));
      stageGrid.appendChild(btn);
    });

    function makeTags(container, list, cls) {
      container.innerHTML = '';
      list.forEach(name => {
        const tag = document.createElement('span');
        tag.className = `tag ${cls}`;
        if (currentSoloMuscle === name) tag.classList.add('solo');
        tag.innerHTML = `<span class="dot"></span>${name}`;
        
        // 筋肉タグクリックイベント
        tag.addEventListener('click', (e) => {
          e.stopPropagation();
          if (currentSoloMuscle === name) {
            currentSoloMuscle = null;
          } else {
            currentSoloMuscle = name;
          }
          makeTags(primaryTags, stages[currentStageIdx].primary, 'primary');
          makeTags(secondaryTags, stages[currentStageIdx].secondary, 'secondary');
          updateMuscles(stages[currentStageIdx], currentSoloMuscle);
        });

        container.appendChild(tag);
      });
    }

    function selectStage(idx) {
      currentStageIdx = idx;
      currentSoloMuscle = null; // ステージ切り替え時はソロ表示をリセット
      const s = stages[idx];
      const targetTime = s.frame / FPS;

      if (animationAction && mixer) {
        animationAction.paused = false;
        animationAction.time = targetTime;
        mixer.update(0);
        animationAction.paused = true;
      }

      // テキスト更新
      stageName.textContent = s.name;
      stageEn.textContent   = s.en;
      stageDesc.textContent = s.desc;
      stageAnalogy.innerHTML = `<strong>例え：</strong>${s.analogy}`;
      stageAdvice.innerHTML  = `<strong>アドバイス：</strong>${s.advice}`;
      musNote.textContent   = s.muscleNote;
      makeTags(primaryTags,   s.primary,   'primary');
      makeTags(secondaryTags, s.secondary, 'secondary');

      timeline.value = targetTime;
      timeLabel.textContent = `${targetTime.toFixed(2)}s`;

      document.querySelectorAll('.stage-btn').forEach((b, i) =>
        b.classList.toggle('active', i === idx));
      playBtn.classList.remove('active');
      pauseBtn.classList.add('active');

      // 筋肉色分け更新
      updateMuscles(s);
    }

    playBtn.addEventListener('click', () => {
      if (animationAction) { animationAction.timeScale = 0.25; animationAction.paused = false; }
      playBtn.classList.add('active');
      pauseBtn.classList.remove('active');
    });

    pauseBtn.addEventListener('click', () => {
      if (animationAction) animationAction.paused = true;
      pauseBtn.classList.add('active');
      playBtn.classList.remove('active');
    });

    resetBtn.addEventListener('click', () => {
      if (animationAction) {
        animationAction.stop();                      // 完全リセット
        animationAction.setLoop(THREE.LoopOnce, 1);
        animationAction.clampWhenFinished = true;
        animationAction.timeScale = 0.25;
        animationAction.play();
        animationAction.paused = false;
        timeline.value = 0;
        timeLabel.textContent = '0.00s';
        playBtn.classList.add('active');
        pauseBtn.classList.remove('active');
      }
    });

    timeline.addEventListener('input', (e) => {
      if (animationAction && mixer) {
        animationAction.paused = false;
        animationAction.time = parseFloat(e.target.value);
        mixer.update(0);
        animationAction.paused = true;
        const time = animationAction.time;
        timeLabel.textContent = `${time.toFixed(2)}s`;
      }
    });

    // ================================================================
    // レンダリングループ
    // ================================================================
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer && !animationAction.paused) {
        mixer.update(delta);
        // F80 を超えたら停止
        if (animationAction.time >= MAX_TIME) {
          animationAction.paused = false;
          animationAction.time = MAX_TIME;
          mixer.update(0);
          animationAction.paused = true;
          playBtn.classList.remove('active');
          pauseBtn.classList.add('active');
        }
        const t = Math.min(animationAction.time, MAX_TIME);
        timeline.value = t;
        timeLabel.textContent = `${t.toFixed(2)}s`;
      }
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
  </script>
</body>
</html>
