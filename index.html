  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.82);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f1f5f9;
      --muted: #a9b6cd;
      --accent: #7dd3fc;
      --accent-2: #fb7185;
      --accent-3: #fbbf24;
      --ok: #34d399;
      --shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(251, 113, 133, 0.10), transparent 24%),
        linear-gradient(180deg, #08101d 0%, #0b1220 100%);
    }
    a { color: #93c5fd; }
    .wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .viewer-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 450px;
    }
    .header {
      padding: 14px 16px 8px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(125, 211, 252, 0.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    h1 {
      margin: 8px 0 6px;
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.2;
    }
    .sub {
      color: var(--muted);
      line-height: 1.5;
      font-size: 12.5px;
      margin: 0;
    }
    #viewer {
      position: relative;
      flex: 1;
      background:
        radial-gradient(circle at 50% 15%, rgba(125, 211, 252, 0.13), transparent 32%),
        linear-gradient(180deg, rgba(15,23,42,.2), rgba(2,6,23,.88));
    }
    canvas { display: block; width: 100%; height: 100%; }
    .viewer-overlay {
      position: absolute;
      inset: 16px 16px auto 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      flex-wrap: wrap;
    }
    .pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,.72);
      border: 1px solid rgba(148,163,184,.16);
      color: #d8e4f7;
      font-size: 11px;
      backdrop-filter: blur(10px);
    }
    .controls {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15,23,42,.35), rgba(15,23,42,.85));
    }
    .btn-row, .slider-row {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      gap: 10px;
      align-items: center;
    }
    .btn-row::-webkit-scrollbar { display: none; }
    .slider-row { margin-top: 12px; }
    button {
      flex-shrink: 0;
      appearance: none;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(30,41,59,.9);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
      font-size: 12px;
    }
    button:hover { transform: translateY(-1px); background: rgba(51,65,85,.96); }
    button.active { background: linear-gradient(135deg, rgba(14,165,233,.9), rgba(59,130,246,.85)); }
    .ghost { background: rgba(15,23,42,.35); }
    input[type="range"] {
      width: min(100%, 480px);
      accent-color: var(--accent);
    }
    .time {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 13px;
    }
    .right-panel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }
    .stage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 16px 0;
    }
    .stage-btn {
      text-align: left;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.14);
      background: linear-gradient(180deg, rgba(30,41,59,.88), rgba(15,23,42,.88));
      min-height: 64px;
    }
    .stage-btn small { display:block; color: var(--muted); margin-bottom:2px; font-weight:600; font-size:10px; }
    .stage-btn strong { display:block; font-size: 14px; }
    .stage-btn.active {
      border-color: rgba(125,211,252,.42);
      box-shadow: 0 0 0 1px rgba(125,211,252,.15) inset, 0 8px 20px rgba(2,132,199,.15);
      background: linear-gradient(180deg, rgba(14,165,233,.26), rgba(15,23,42,.96));
    }
    .content {
      padding: 12px 16px 10px;
      overflow: auto;
    }
    .card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card h2, .card h3 { margin: 0 0 8px; font-size: 14px; }
    .stage-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stage-title .jp {
      font-size: clamp(20px, 2vw, 26px);
      font-weight: 800;
    }
    .stage-title .en {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: .03em;
      font-size: 14px;
    }
    .desc {
      color: #edf4ff;
      line-height: 1.6;
      margin: 0 0 6px;
      font-size: 13px;
    }
    .note {
      color: var(--muted);
      line-height: 1.6;
      font-size: 12px;
      margin: 0;
    }
    .muscle-section { margin-top: 10px; }
    .muscle-section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .muscle-section-label.primary { color: #fb7185; }
    .muscle-section-label.secondary { color: #fbbf24; }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }
    .tag:hover {
      filter: brightness(1.2);
      transform: scale(1.03);
    }
    .tag.solo {
      outline: 2px solid white;
      outline-offset: 1px;
    }
    .tag.primary {
      background: rgba(251,113,133,.13);
      color: #fca5a5;
      border: 1px solid rgba(251,113,133,.22);
    }
    .tag.secondary {
      background: rgba(251,191,36,.1);
      color: #fde68a;
      border: 1px solid rgba(251,191,36,.18);
    }
    .analogy-box {
      background: rgba(125, 211, 252, 0.08);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 12px;
      border-radius: 0 8px 8px 0;
    }
    .advice-box {
      background: rgba(52, 211, 153, 0.08);
      border-left: 3px solid var(--ok);
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 12px;
      border-radius: 0 8px 8px 0;
    }
    .tag .dot {
      width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0;
    }
    .tag.primary .dot { background: #fb7185; }
    .tag.secondary .dot { background: #fbbf24; }
    .footer-note {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }
    .tenouchi-section {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .tenouchi-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
    }
    .tenouchi-header-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #a78bfa;
    }
    .tenouchi-toggle {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .tenouchi-toggle.open { transform: rotate(180deg); }
    .tenouchi-body { display: none; }
    .tenouchi-body.open { display: block; }
    .tenouchi-point {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.5;
    }
    .tenouchi-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(167,139,250,0.15);
      border: 1px solid rgba(167,139,250,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      margin-top: 1px;
    }
    .tenouchi-point-text { color: #e2d9f7; }
    .tenouchi-point-text strong { color: #c4b5fd; }
    .tenouchi-warning {
      background: rgba(251,191,36,0.08);
      border-left: 3px solid #fbbf24;
      padding: 6px 10px;
      margin-top: 8px;
      font-size: 11px;
      border-radius: 0 6px 6px 0;
      color: #fde68a;
      line-height: 1.5;
    }
    @media screen and (orientation: landscape) and (max-height: 600px) {
      .tenouchi-point { font-size: 10px; margin-bottom: 4px; }
      .tenouchi-icon { width: 16px; height: 16px; font-size: 9px; }
      .tenouchi-warning { font-size: 10px; }
    }
    /* 横画面時のレイアウト（デスクトップ or 横向きモバイル） */
    @media (min-width: 1100px), (orientation: landscape) {
      .wrap {
        display: grid;
        grid-template-columns: 1.2fr 0.95fr;
        height: 100vh;
        height: 100svh;
        overflow: hidden;
        padding: 8px;
        gap: 8px;
      }
      .viewer-panel, .right-panel { height: 100%; min-height: 0; }
      .content { overflow-y: auto; }
    }

    /* 縦画面警告オーバーレイ */
    #orientation-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    /* 向きオーバーレイはJSのstyle属性で制御 */

    .rotate-hint {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      color: var(--accent);
      animation: rotate-anim 2s ease-in-out infinite;
    }
    @keyframes rotate-anim {
      0% { transform: rotate(0deg); }
      70% { transform: rotate(-90deg); }
      100% { transform: rotate(-90deg); }
    }

    /* 横向きスマホ（高さが低い画面）専用の最適化 */
    @media screen and (orientation: landscape) and (max-height: 600px) {
      .header { padding: 6px 12px 4px; }
      .header h1 { font-size: 15px; margin: 0; }
      .header .eyebrow { display: none; }
      .header .sub { font-size: 11px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .viewer-panel { min-height: 0; }

      /* 節ボタンを横スクロールの1列に変更して縦幅を節約 */
      .stage-grid {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 5px 12px;
        gap: 6px;
        border-bottom: 1px solid var(--line);
        -webkit-overflow-scrolling: touch;
      }
      .right-panel { grid-template-rows: auto auto 1fr auto; }
      .stage-grid::-webkit-scrollbar { display: none; }
      
      .stage-btn {
        min-height: auto;
        padding: 6px 12px;
        flex: 0 0 auto;
        border-radius: 8px;
      }
      .stage-btn small { display: none; }
      .stage-btn strong { font-size: 12px; }

      .content { padding: 8px 12px; }
      .card { padding: 10px; border-radius: 10px; margin-bottom: 6px; }
      .stage-title { margin-bottom: 2px; }
      .stage-title .jp { font-size: 18px; }
      .stage-title .en { font-size: 11px; }
      .desc, .note, .analogy-box, .advice-box { font-size: 11px; margin: 2px 0; line-height: 1.4; }
      .muscle-section { margin-top: 4px; }
      .muscle-section-label { font-size: 10px; margin-bottom: 4px; }
      .tag { font-size: 10px; padding: 2px 6px; }

      .controls { padding: 4px 12px 6px; }
      .btn-row { gap: 6px; }
      .btn-row button { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
      .time { font-size: 11px; }
      .slider-row { margin-top: 2px; }
      .slider-row .time { display: none; }
      input[type="range"] { height: 24px; }
    }

    @media (max-width: 600px) and (orientation: portrait) {
      .stage-grid { grid-template-columns: repeat(2, 1fr); }
      .btn-row button { padding: 6px 10px; font-size: 11px; }
      h1 { font-size: 20px; }
      .header { padding: 10px 12px; }
      .viewer-panel { min-height: 400px; }
    }

    /* ローディング画面のスタイル */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    .loader-bar-wrap {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    }
    #loader-bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <!-- 縦画面警告オーバーレイ -->
  <div id="orientation-overlay">
    <div class="rotate-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
    </div>
    <h2 style="margin:0 0 10px;">画面を横向きにしてください</h2>
    <p class="sub">この教材は横画面での閲覧に最適化されています。</p>
    <p class="sub" style="margin-top: 15px; font-size: 11px; color: var(--accent-2);">※画面が変わらない場合は、スマホの「縦向きロック」をオフにしてください。</p>
  </div>

  <div class="wrap">
    <!-- 左パネル: 3Dビューア -->
    <section class="panel viewer-panel">
      <div class="header">
        <div class="eyebrow">3D / 筋肉色分けビューア</div>
        <h1>弓道・射法八節 3D解説</h1>
        <p class="sub">節ボタンで局面移動、筋肉タグクリックで特定部位の単独表示が可能です。</p>
      </div>
      <div id="viewer">
        <!-- ローディング画面を追加 -->
        <div id="loading-screen">
          <div style="font-size: 14px; font-weight: bold; color: var(--accent);">3Dモデル読込中...</div>
          <div class="loader-bar-wrap">
            <div id="loader-bar"></div>
          </div>
          <div id="loader-text" style="font-size: 11px; color: var(--muted); margin-top: 8px;">0%</div>
        </div>
      </div>
      <div class="controls">
        <div class="btn-row">
          <button id="playBtn">全体再生</button>
          <button id="pauseBtn" class="ghost">停止</button>
          <button id="resetBtn" class="ghost">先頭に戻す</button>
          <button id="fitBtn" class="ghost">中央表示</button>
          <span class="time" id="timeLabel">0.00 s</span>
        </div>
        <div class="slider-row">
          <input id="timeline" type="range" min="0" max="7.041667" step="0.041667" value="0.041667" />
          <span class="time">ドラッグでポーズ移動</span>
        </div>
      </div>
    </section>

    <!-- 右パネル: 射法八節 選択 + 筋肉解説 -->
    <aside class="panel right-panel">
      <div class="header">
        <div class="eyebrow">射法八節</div>
        <h1>節を選んで動作を確認</h1>
        <p class="sub">全日本弓道連盟資料および研究論文を基に構成。</p>
      </div>

      <div class="stage-grid" id="stageGrid"></div>

      <div class="content">
        <section class="card">
          <div class="stage-title">
            <div class="jp" id="stageName">足踏み</div>
            <div class="en" id="stageEn">Ashibumi</div>
          </div>
          <p class="desc" id="stageDesc"></p>
          <div id="stageAnalogy" class="analogy-box"></div>
          <div id="stageAdvice" class="advice-box"></div>
          <p class="note" id="stageMuscleNote"></p>

          <div class="muscle-section" id="primarySection">
            <div class="muscle-section-label primary">主動筋（Primary）</div>
            <div class="tags" id="primaryTags"></div>
          </div>
          <div class="muscle-section" id="secondarySection" style="margin-top:12px;">
            <div class="muscle-section-label secondary">補助・安定筋（Secondary）</div>
            <div class="tags" id="secondaryTags"></div>
          </div>

          <!-- 手の内セクション -->
          <div class="tenouchi-section" id="tenouchiSection">
            <div class="tenouchi-header" id="tenouchiToggle">

              <span class="tenouchi-header-label">手の内チェックポイント</span>

            <div class="tenouchi-body" id="tenouchiBody">
              <div id="tenouchiPoints"></div>
            </div>
          </div>
        </section>
      </div>
    </aside>
  </div>

  <script type="importmap">
    {

    // LoadingManagerで進捗を管理

    manager.onProgress = (url, itemsLoaded, itemsTotal) => {
      const progress = (itemsLoaded / itemsTotal) * 100;
      loaderBar.style.width = progress + '%';
      loaderText.textContent = Math.round(progress) + '%';
    };
    manager.onLoad = () => {
      // 読み込み完了後、少し待ってからフェードアウト
      setTimeout(() => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => loadingScreen.style.display = 'none', 500);
      }, 200);
    };

    const loader = new GLTFLoader(manager);
    loader.load('弓道基礎１.glb', (gltf) => {
      const model = gltf.scene;
      model.rotation.x = Math.PI / 2;
      scene.add(model);
      loadedModel = model;

      // オリジナルマテリアルを保存
      model.traverse(obj => {
        if (!obj.isMesh) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(mat => {
          if (!originalMaterials.has(mat.uuid)) {
            originalMaterials.set(mat.uuid, {
              color: mat.color.clone(),
              transparent: mat.transparent,
              opacity: mat.opacity,
            });
          }
        });
      });

      // バウンディングボックス → カメラ位置
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const targetY = box.min.y + size.y * 0.52;
      controls.target.set(center.x, targetY, center.z);
      const halfH  = size.y / 2.2;
      const fovRad = (camera.fov * Math.PI) / 180;
      const dist   = (halfH / Math.tan(fovRad / 2)) * 1.15;
      camera.position.set(center.x, targetY, center.z + dist);
      controls.update();

      const defaultCamPos    = camera.position.clone();
      const defaultTargetPos = controls.target.clone();
      document.getElementById('fitBtn').addEventListener('click', () => {
        camera.position.copy(defaultCamPos);
        controls.target.copy(defaultTargetPos);
        controls.update();
      });

      // アニメーション設定
      if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        animationAction = mixer.clipAction(gltf.animations[0]);
        animationAction.setLoop(THREE.LoopOnce, 1); // 1回再生で止まる
        animationAction.clampWhenFinished = true;   // 最終フレームで静止
        animationAction.play();
        document.getElementById('timeline').max = MAX_TIME; // F80 = 3.333s まで
        selectStage(0);
      }
    }, undefined, (err) => {
      console.error('GLB load error:', err);

    // ================================================================

    function setMeshColor(mesh, color, opacity) {
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      mats.forEach(mat => {
        mat.color.set(color);
        mat.transparent = true;
        mat.opacity = opacity;
        mat.depthWrite = opacity > 0.9;
        mat.needsUpdate = true;
      });
    }

    function resetMeshMaterial(mesh) {
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      mats.forEach(mat => {
        const orig = originalMaterials.get(mat.uuid);
        if (orig) {
          mat.color.copy(orig.color);
          mat.transparent = orig.transparent;
          mat.opacity = orig.opacity;
          mat.depthWrite = !orig.transparent;
          mat.needsUpdate = true;
        }
      });
    }

      // 表示すべき単一筋肉のノードセット（ソロモード用）
      const soloNodes = new Set();
      if (soloGroup && MUSCLE_NODES[soloGroup]) {
        MUSCLE_NODES[soloGroup].forEach(n => soloNodes.add(n));
      }

      // primary / secondary のノード名セットを構築
      const primaryNodes   = new Set();
      const secondaryNodes = new Set();

      for (const group of stage.primary) {
        const nodes = MUSCLE_NODES[group];
        if (nodes) nodes.forEach(n => primaryNodes.add(n));
      }
      for (const group of stage.secondary) {
        const nodes = MUSCLE_NODES[group];
        if (nodes) nodes.forEach(n => secondaryNodes.add(n));
      }

      loadedModel.traverse(obj => {
        // 素体は常時表示・色変更なし
        if (obj.name === 'kyudo_male_base') {
          obj.visible = true;
          return;
        }

        if (!obj.isMesh) return;

        // ノード名を特定: obj自身の名前か、親ノードの名前
        const nodeName = primaryNodes.has(obj.name) || secondaryNodes.has(obj.name)
          ? obj.name
          : (obj.parent?.name ?? obj.name);

        // ソロモードの判定
        if (soloGroup) {
          if (soloNodes.has(nodeName)) {
            obj.visible = true;
            const isPri = primaryNodes.has(nodeName);
            setMeshColor(obj, isPri ? COLOR_PRIMARY : COLOR_SECONDARY, 0.95);
          } else {
            obj.visible = false;
          }
          return;
        }

        if (primaryNodes.has(nodeName)) {
          obj.visible = true;
          setMeshColor(obj, COLOR_PRIMARY, 0.92);
        } else if (secondaryNodes.has(nodeName)) {
          obj.visible = true;
          setMeshColor(obj, COLOR_SECONDARY, 0.82);
        } else {
          // 非選択筋は非表示
          obj.visible = false;
        }
      });
    }

    // ================================================================
    // UI 生成・イベント
    // ================================================================
    const stageGrid    = document.getElementById('stageGrid');
    const stageName    = document.getElementById('stageName');
    const stageEn      = document.getElementById('stageEn');
    const stageDesc    = document.getElementById('stageDesc');
    const stageAnalogy = document.getElementById('stageAnalogy');
    const stageAdvice  = document.getElementById('stageAdvice');
    const musNote      = document.getElementById('stageMuscleNote');
    const primaryTags  = document.getElementById('primaryTags');
    const secondaryTags = document.getElementById('secondaryTags');
    const playBtn      = document.getElementById('playBtn');
    const pauseBtn     = document.getElementById('pauseBtn');
    const resetBtn     = document.getElementById('resetBtn');
    const timeline     = document.getElementById('timeline');
    const timeLabel    = document.getElementById('timeLabel');
    const tenouchiPoints = document.getElementById('tenouchiPoints');
    const tenouchiToggle = document.getElementById('tenouchiToggle');
    const tenouchiBody   = document.getElementById('tenouchiBody');
    const tenouchiArrow  = document.getElementById('tenouchiArrow');

    // 手の内セクションの折りたたみ
    tenouchiToggle.addEventListener('click', () => {
      const isOpen = tenouchiBody.classList.toggle('open');
      tenouchiArrow.classList.toggle('open', isOpen);
    });

    function renderTenouchi(stage) {
      tenouchiPoints.innerHTML = '';
      if (!stage.tenouchi || stage.tenouchi.length === 0) return;
      stage.tenouchi.forEach(pt => {
        const div = document.createElement('div');
        div.className = 'tenouchi-point';
        div.innerHTML = `<div class="tenouchi-icon">${pt.icon}</div><div class="tenouchi-point-text">${pt.text}</div>`;
        tenouchiPoints.appendChild(div);
      });
      if (stage.tenouchiWarning) {
        const warn = document.createElement('div');
        warn.className = 'tenouchi-warning';
        warn.textContent = stage.tenouchiWarning;
        tenouchiPoints.appendChild(warn);
      }
    }

    // ステージボタン生成
    stages.forEach((s, idx) => {
      const btn = document.createElement('button');
      btn.className = 'stage-btn';
      btn.innerHTML = `<small>第${idx + 1}節</small><strong>${s.name}</strong>`;
      btn.addEventListener('click', () => selectStage(idx));
      stageGrid.appendChild(btn);
    });

    function makeTags(container, list, cls) {
      container.innerHTML = '';
      list.forEach(name => {
        const tag = document.createElement('span');
        tag.className = `tag ${cls}`;
        if (currentSoloMuscle === name) tag.classList.add('solo');
        tag.innerHTML = `<span class="dot"></span>${name}`;
        
        // 筋肉タグクリックイベント
        tag.addEventListener('click', (e) => {
          e.stopPropagation();
          if (currentSoloMuscle === name) {
            currentSoloMuscle = null;
          } else {
            currentSoloMuscle = name;
          }
          makeTags(primaryTags, stages[currentStageIdx].primary, 'primary');
          makeTags(secondaryTags, stages[currentStageIdx].secondary, 'secondary');
          updateMuscles(stages[currentStageIdx], currentSoloMuscle);
        });

        container.appendChild(tag);
      });
    }

    function selectStage(idx) {
      currentStageIdx = idx;
      currentSoloMuscle = null; // ステージ切り替え時はソロ表示をリセット
      const s = stages[idx];
      const targetTime = s.frame / FPS;

      if (animationAction && mixer) {
        animationAction.paused = false;
        animationAction.time = targetTime;
        mixer.update(0);
        animationAction.paused = true;
      }

      // テキスト更新
      stageName.textContent = s.name;
      stageEn.textContent   = s.en;
      stageDesc.textContent = s.desc;
      stageAnalogy.innerHTML = `<strong>例え：</strong>${s.analogy}`;
      stageAdvice.innerHTML  = `<strong>アドバイス：</strong>${s.advice}`;
      musNote.textContent   = s.muscleNote;
      makeTags(primaryTags,   s.primary,   'primary');
      makeTags(secondaryTags, s.secondary, 'secondary');
      renderTenouchi(s);

      timeline.value = targetTime;
      timeLabel.textContent = `${targetTime.toFixed(2)}s`;

      document.querySelectorAll('.stage-btn').forEach((b, i) =>
        b.classList.toggle('active', i === idx));
      playBtn.classList.remove('active');
      pauseBtn.classList.add('active');

      // 筋肉色分け更新
      updateMuscles(s);
    }

    playBtn.addEventListener('click', () => {
      if (animationAction) { animationAction.timeScale = 0.25; animationAction.paused = false; }
      playBtn.classList.add('active');
      pauseBtn.classList.remove('active');
    });

    pauseBtn.addEventListener('click', () => {
      if (animationAction) animationAction.paused = true;
      pauseBtn.classList.add('active');
      playBtn.classList.remove('active');
    });

    resetBtn.addEventListener('click', () => {
      if (animationAction) {
        animationAction.stop();                      // 完全リセット
        animationAction.setLoop(THREE.LoopOnce, 1);
        animationAction.clampWhenFinished = true;
        animationAction.timeScale = 0.25;
        animationAction.play();
        animationAction.paused = false;
        timeline.value = 0;
        timeLabel.textContent = '0.00s';
        playBtn.classList.add('active');
        pauseBtn.classList.remove('active');
      }
    });

    timeline.addEventListener('input', (e) => {
      if (animationAction && mixer) {
        animationAction.paused = false;
        animationAction.time = parseFloat(e.target.value);
        mixer.update(0);
        animationAction.paused = true;
        const time = animationAction.time;
        timeLabel.textContent = `${time.toFixed(2)}s`;
      }
    });

    // ================================================================
    // レンダリングループ
    // ================================================================
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer && !animationAction.paused) {
        mixer.update(delta);
        // F80 を超えたら停止
        if (animationAction.time >= MAX_TIME) {
          animationAction.paused = false;
          animationAction.time = MAX_TIME;
          mixer.update(0);
          animationAction.paused = true;
          playBtn.classList.remove('active');
          pauseBtn.classList.add('active');
        }
        const t = Math.min(animationAction.time, MAX_TIME);
        timeline.value = t;
        timeLabel.textContent = `${t.toFixed(2)}s`;
      }
      controls.update();
      renderer.render(scene, camera);
    }

    // 画面サイズ・向きの更新処理を共通化
    function isLandscapeMode() {
      // screen.orientation API（モダンブラウザ・Android優先）
      if (window.screen && window.screen.orientation && window.screen.orientation.type) {
        return window.screen.orientation.type.startsWith('landscape');
      }
      // window.orientation（古いiOS: 90 or -90 = 横向き）
      if (typeof window.orientation === 'number') {
        return window.orientation === 90 || window.orientation === -90;
      }
      // フォールバック（デスクトップ等）
      return window.innerWidth > window.innerHeight;
    }

    function handleResize() {
      const overlay = document.getElementById('orientation-overlay');
      const landscape = isLandscapeMode();

      // オーバーレイの表示制御（style属性のみで統一、CSSクラスとの競合を排除）
      if (overlay) {
        overlay.style.display = landscape ? 'none' : 'flex';
      }

      if (!container) return;
      // レンダラーのリサイズは常に実行（向きに関わらず）
      const width  = container.clientWidth;
      const height = container.clientHeight;
      if (width > 0 && height > 0) {
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      }
    }

    // resizeは即時実行
    window.addEventListener('resize', handleResize);

    // orientationchangeはiOS/Androidで反映が遅いため段階的にリトライ
    window.addEventListener('orientationchange', () => {
      setTimeout(handleResize, 100);
      setTimeout(handleResize, 400);
      setTimeout(handleResize, 800);
    });

    // screen.orientation change（モダンブラウザ用）
    if (window.screen && window.screen.orientation) {
      window.screen.orientation.addEventListener('change', () => {
        setTimeout(handleResize, 100);
      });
    }

    // 初回実行
    handleResize();

    animate();

    // Service Worker Registration for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
