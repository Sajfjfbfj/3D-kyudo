<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リアル八節くん ─ マイリスト</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.82);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f1f5f9;
      --muted: #a9b6cd;
      --accent: #7dd3fc;
      --accent-2: #fb7185;
      --shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    /* 縦画面警告オーバーレイ */
    #orientation-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .rotate-hint {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      color: var(--accent);
      animation: rotate-anim 2s ease-in-out infinite;
    }
    @keyframes rotate-anim {
      0%   { transform: rotate(0deg); }
      70%  { transform: rotate(-90deg); }
      100% { transform: rotate(-90deg); }
    }
    @media (orientation: portrait)  { #orientation-overlay { display: flex; } }
    @media (orientation: landscape) { #orientation-overlay { display: none; } }
    body {
      margin: 0; font-family: Inter, sans-serif; background: var(--bg); color: var(--text);
      background: radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 28%), linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      min-height: 100vh; padding: 20px 20px 100px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 24px; }
    section { margin-bottom: 32px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px;
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.2s;
    }
    .card:hover { border-color: var(--accent); background: rgba(125, 211, 252, 0.05); }
    .info { display: flex; flex-direction: column; gap: 4px; }
    .name { font-weight: 700; font-size: 16px; }
    .meta { font-size: 11px; color: var(--muted); }
    .actions { display: flex; gap: 8px; }
    .btn {
      padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s;
    }
    .btn-view { background: var(--accent); color: var(--bg); }
    .btn-del { background: rgba(251, 113, 133, 0.1); color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.2); }
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; border: 1px dashed var(--line); border-radius: 16px; }


  
    /* ハンバーガーボタン */
    .menu-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20000;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      box-shadow: var(--shadow);
      transition: 0.2s;
      appearance: none;
    }
    .menu-toggle:hover { border-color: var(--accent); }
    .menu-toggle span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: 0.3s;
    }
    .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; }
    .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .overlay-menu {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 15000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay-menu.show { opacity: 1; pointer-events: all; }
    .side-nav {
      position: fixed;
      top: 0;
      right: -260px;
      width: 240px;
      height: 100vh;
      background: rgba(10, 18, 35, 0.97);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--line);
      z-index: 16000;
      padding: 80px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: -10px 0 40px rgba(0,0,0,0.4);
      transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .side-nav.open { right: 0; }
    .side-nav-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 4px;
      padding-left: 4px;
    }
    .side-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 12px;
      transition: 0.2s;
      display: block;
    }
    .side-nav a:hover { color: var(--accent); background: rgba(125, 211, 252, 0.08); }
    .side-nav a.active { color: #0b1220; background: var(--accent); }
  
    @media (orientation: portrait) { .menu-toggle { display: none !important; } }

    .sub {
      color: var(--muted);
      line-height: 1.5;
      font-size: 12.5px;
      margin: 0;
      display: block;
    }
    /* ===== 横画面・小さい画面対応（縦画面オーバーレイはそのまま） ===== */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body { padding: 10px 16px 60px; }
      h1 { font-size: 18px; margin-bottom: 14px; }
      .card { padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; }
      .name { font-size: 14px; }
      .btn { padding: 6px 12px; font-size: 11px; }
    }
    @media screen and (orientation: landscape) and (max-width: 900px) {
      body { padding: 16px 20px 80px; }
      .container { max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- 縦画面警告オーバーレイ -->
<div id="orientation-overlay">
  <div class="rotate-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
  </div>
  <h2 style="margin:0 0 10px;">画面を横向きにしてください</h2>
  <p class="sub">この教材は横画面で見やすいように設計されています。</p>
  <p class="sub" style="margin-top: 15px; font-size: 11px; color: var(--accent-2);">※画面の向きが変わらない場合は、スマホの「縦向きロック」をオフにしてください。</p>
</div>

<div class="container">
  <h1>マイリスト</h1>

  <section>
    <h2>現在編集中のデータ</h2>
    <div id="editing-root"></div>
  </section>

  <section>
    <h2>お気に入り保存済み</h2>
    <div id="favorites-root"></div>
  </section>
</div>


<button class="menu-toggle" id="menuToggle" aria-label="メニュー">
  <span></span><span></span><span></span>
</button>
<div class="overlay-menu" id="overlayMenu"></div>
<nav class="side-nav" id="sideNav">
  <div class="side-nav-label">ページ移動</div>
  <a href="index.html">一般用</a>
  <a href="中高生.html">中高生用</a>
  <a href="カスタム.html">３D編集</a>
  <a href="プレビュー.html">閲覧用</a>
  <a href="マイリスト.html" class="active">マイリスト</a>
</nav>


<script>
  function render() {
    // 編集中のデータ
    const editingRoot = document.getElementById('editing-root');
    const currentEdit = localStorage.getItem('kyudo_custom_notes_v2');
    if (currentEdit) {
      editingRoot.innerHTML = `
        <div class="card">
          <div class="info">
            <div class="name">現在エディタで編集中のノート</div>
            <div class="meta">最終更新: ブラウザに自動保存されています</div>
          </div>
          <div class="actions">
            <button class="btn btn-view" onclick="location.href='カスタム.html'">編集を続ける</button>
          </div>
        </div>
      `;
    } else {
      editingRoot.innerHTML = `<div class="empty">編集中のデータはありません</div>`;
    }

    // お気に入り
    const favRoot = document.getElementById('favorites-root');
    const favorites = JSON.parse(localStorage.getItem('kyudo_favorites') || '[]');
    
    if (favorites.length > 0) {
      favRoot.innerHTML = favorites.map((fav, index) => `
        <div class="card">
          <div class="info">
            <div class="name">${fav.name}</div>
            <div class="meta">保存日: ${new Date(fav.id).toLocaleString()}</div>
          </div>
          <div class="actions">
            <button class="btn btn-view" onclick="viewFavorite(${fav.id})">プレビュー</button>
            <button class="btn btn-del" onclick="deleteFavorite(${index})">削除</button>
          </div>
        </div>
      `).join('');
    } else {
      favRoot.innerHTML = `<div class="empty">お気に入りはありません。プレビューページで⭐ボタンを押して保存できます。</div>`;
    }
  }

  window.viewFavorite = function(id) {
    location.href = `プレビュー.html?localId=${id}`;
  };

  window.deleteFavorite = function(index) {
    if (!confirm("このお気に入りを削除しますか？")) return;
    const favorites = JSON.parse(localStorage.getItem('kyudo_favorites') || '[]');
    favorites.splice(index, 1);
    localStorage.setItem('kyudo_favorites', JSON.stringify(favorites));
    render();
  };

  render();
</script>

<script>
  var _menuToggle = document.getElementById('menuToggle');
  var _sideNav = document.getElementById('sideNav');
  var _overlayMenu = document.getElementById('overlayMenu');
  function _openMenu() { _menuToggle.classList.add('open'); _sideNav.classList.add('open'); _overlayMenu.classList.add('show'); }
  function _closeMenu() { _menuToggle.classList.remove('open'); _sideNav.classList.remove('open'); _overlayMenu.classList.remove('show'); }
  _menuToggle.addEventListener('click', function() { _sideNav.classList.contains('open') ? _closeMenu() : _openMenu(); });
  _overlayMenu.addEventListener('click', _closeMenu);
</script>
</body>
</html>
