<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リアル八節くん ─ マイリスト</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.82);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f1f5f9;
      --muted: #a9b6cd;
      --accent: #7dd3fc;
      --shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    body {
      margin: 0; font-family: Inter, sans-serif; background: var(--bg); color: var(--text);
      background: radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 28%), linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      min-height: 100vh; padding: 20px 20px 100px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 24px; }
    section { margin-bottom: 32px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px;
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.2s;
    }
    .card:hover { border-color: var(--accent); background: rgba(125, 211, 252, 0.05); }
    .info { display: flex; flex-direction: column; gap: 4px; }
    .name { font-weight: 700; font-size: 16px; }
    .meta { font-size: 11px; color: var(--muted); }
    .actions { display: flex; gap: 8px; }
    .btn {
      padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s;
    }
    .btn-view { background: var(--accent); color: var(--bg); }
    .btn-del { background: rgba(251, 113, 133, 0.1); color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.2); }
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; border: 1px dashed var(--line); border-radius: 16px; }

    .global-nav {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; padding: 6px; border-radius: 999px;
      background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
      border: 1px solid var(--line); z-index: 10000; box-shadow: var(--shadow);
    }
    .global-nav a {
      color: var(--muted); text-decoration: none; font-size: 11px; font-weight: 700;
      padding: 8px 16px; border-radius: 999px; transition: 0.2s; white-space: nowrap;
    }
    .global-nav a:hover { color: var(--accent); background: rgba(255,255,255,0.05); }
    .global-nav a.active { color: var(--bg); background: var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <h1>マイリスト</h1>

  <section>
    <h2>現在編集中のデータ</h2>
    <div id="editing-root"></div>
  </section>

  <section>
    <h2>お気に入り保存済み</h2>
    <div id="favorites-root"></div>
  </section>
</div>

<nav class="global-nav">
  <a href="index.html">一般用</a>
  <a href="中高生.html">中高生用</a>
  <a href="カスタム.html">３D編集</a>
  <a href="プレビュー.html">閲覧用</a>
  <a href="マイリスト.html" class="active">マイリスト</a>
</nav>

<script>
  function render() {
    // 編集中のデータ
    const editingRoot = document.getElementById('editing-root');
    const currentEdit = localStorage.getItem('kyudo_custom_notes_v2');
    if (currentEdit) {
      editingRoot.innerHTML = `
        <div class="card">
          <div class="info">
            <div class="name">現在エディタで編集中のノート</div>
            <div class="meta">最終更新: ブラウザに自動保存されています</div>
          </div>
          <div class="actions">
            <button class="btn btn-view" onclick="location.href='カスタム.html'">編集を続ける</button>
          </div>
        </div>
      `;
    } else {
      editingRoot.innerHTML = `<div class="empty">編集中のデータはありません</div>`;
    }

    // お気に入り
    const favRoot = document.getElementById('favorites-root');
    const favorites = JSON.parse(localStorage.getItem('kyudo_favorites') || '[]');
    
    if (favorites.length > 0) {
      favRoot.innerHTML = favorites.map((fav, index) => `
        <div class="card">
          <div class="info">
            <div class="name">${fav.name}</div>
            <div class="meta">保存日: ${new Date(fav.id).toLocaleString()}</div>
          </div>
          <div class="actions">
            <button class="btn btn-view" onclick="viewFavorite(${fav.id})">プレビュー</button>
            <button class="btn btn-del" onclick="deleteFavorite(${index})">削除</button>
          </div>
        </div>
      `).join('');
    } else {
      favRoot.innerHTML = `<div class="empty">お気に入りはありません。プレビューページで⭐ボタンを押して保存できます。</div>`;
    }
  }

  window.viewFavorite = function(id) {
    location.href = `プレビュー.html?localId=${id}`;
  };

  window.deleteFavorite = function(index) {
    if (!confirm("このお気に入りを削除しますか？")) return;
    const favorites = JSON.parse(localStorage.getItem('kyudo_favorites') || '[]');
    favorites.splice(index, 1);
    localStorage.setItem('kyudo_favorites', JSON.stringify(favorites));
    render();
  };

  render();
</script>

</body>
</html>
